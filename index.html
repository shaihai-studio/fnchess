<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>函数棋 - Function Chess</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 顶部信息栏 -->
    <header class="header">
        <div class="score-display">
            <span class="player">玩家A</span>
            <span class="score" id="score-a">0</span>
            <span>分</span>
        </div>
        
        <h1 class="game-title">函数棋</h1>
        
        <div class="round-info">
            <span>回合</span>
            <span class="current"><span id="current-round">1</span> / <span id="total-rounds">8</span></span>
        </div>
        
        <div class="score-display">
            <span class="player">玩家B</span>
            <span class="score" id="score-b">0</span>
            <span>分</span>
        </div>
    </header>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧 Canvas 区域 -->
        <section class="canvas-section">
            <canvas id="game-canvas"></canvas>
        </section>
        
        <!-- 右侧控制面板 -->
        <aside class="control-panel">
            <!-- 计时器 -->
            <div class="panel-card timer-display">
                <h3>剩余时间</h3>
                <div class="timer-value" id="timer">40</div>
            </div>
            
            <!-- 当前玩家 -->
            <div class="panel-card player-display">
                <h3>当前玩家</h3>
                <div class="player-value" id="current-player">玩家 B</div>
            </div>
            
            <!-- 阶段提示 -->
            <div class="panel-card phase-display">
                <h3>当前阶段</h3>
                <div class="phase-hint" id="phase-hint">请点击棋盘选择目标网格</div>
            </div>
            
            <!-- 表达式构建区 -->
            <div class="panel-card">
                <h3>函数表达式</h3>
                <div class="expression-display" id="expression-display">
                    <span class="placeholder">点击元素构建表达式...</span>
                </div>
            </div>
            
            <!-- 按钮组 -->
            <div class="panel-card">
                <div class="button-group">
                    <button class="btn btn-primary" id="confirm-btn">确认目标</button>
                    <button class="btn btn-secondary" id="clear-btn">清除</button>
                    <button class="btn btn-secondary" id="skip-btn">跳过</button>
                </div>
            </div>
            
            <!-- 消息提示 -->
            <div class="panel-card">
                <div class="message" id="message"></div>
            </div>
        </aside>
    </div>
    
    <!-- 底部元素拖拽区 -->
    <section class="elements-section" id="elements-container">
        <!-- 动态生成 -->
    </section>
    
    <!-- 开始界面模态框 -->
    <div class="modal" id="start-modal">
        <div class="modal-content">
            <h2>函数棋</h2>
            <p>
                一款基于函数的策略对抗游戏<br>
                玩家B选择目标，玩家A构造函数<br>
                精准命中目标，避开禁止区域！
            </p>
            
            <div class="round-select">
                <label for="round-select">选择回合数：</label>
                <select id="round-select">
                    <option value="4">4 回合（快速对战）</option>
                    <option value="8" selected>8 回合（标准对战）</option>
                    <option value="12">12 回合（深度对战）</option>
                    <option value="16">16 回合（持久战）</option>
                    <option value="20">20 回合（极限挑战）</option>
                    <option value="24">24 回合（终极对决）</option>
                </select>
            </div>
            
            <button class="btn btn-primary" id="start-btn" style="width: 100%;">开始游戏</button>
        </div>
    </div>
    
    <!-- 游戏结束模态框 -->
    <div class="modal" id="game-over-modal" style="display: none;">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <div class="winner-text" id="winner"></div>
            <div class="final-scores" id="final-scores"></div>
            <button class="btn btn-primary" id="restart-btn" style="width: 100%;">重新开始</button>
        </div>
    </div>
    
    <!-- 加载 JavaScript 模块 -->
    <script src="js/GridSystem.js"></script>
    <script src="js/CollisionDetector.js"></script>
    <script src="js/FunctionParser.js"></script>
    <script src="js/FunctionRenderer.js"></script>
    <script src="js/GameController.js"></script>
    <script src="js/UIController.js"></script>
    
    <script>
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            // 创建核心组件
            const gridSystem = new GridSystem('game-canvas');
            const gameController = new GameController();
            
            // 创建UI控制器
            const uiController = new UIController(gridSystem, gameController);
            
            // 显示开始界面
            document.getElementById('start-modal').style.display = 'flex';
            
            console.log('函数棋游戏已加载完成！');
            console.log('游戏模块:', {
                gridSystem: !!gridSystem,
                gameController: !!gameController,
                uiController: !!uiController
            });
        });
    </script>
</body>
</html>
