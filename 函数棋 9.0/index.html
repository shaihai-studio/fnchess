<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>函数棋 - Function Chess</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/shaihai-theme.css">
</head>
<body>
    <div id="summa-container"></div>

    <!-- 顶部信息栏 -->
    <header class="header" id="header">
        <div class="score-display">
            <span class="player">玩家A</span>
            <span class="score" id="score-a">0</span>
            <span>分</span>
        </div>
        
        <h1 class="game-title">函数棋</h1>
        
        <div class="round-info" id="round-display">
            <span>回合</span>
            <span class="current"><span id="current-round">1</span> / <span id="total-rounds">8</span></span>
        </div>
        
        <div class="score-display">
            <span class="player">玩家B</span>
            <span class="score" id="score-b">0</span>
            <span>分</span>
        </div>

        <div class="campaign-level-badge" id="campaign-level-badge" style="display:none;">
            <span class="campaign-level-value" id="campaign-level-value">Lv. 1</span>
        </div>
    </header>
    
    <!-- 主容器 -->
    <div class="main-container">
        <!-- 左侧 Canvas 区域 -->
        <section class="canvas-section">
            <canvas id="game-canvas"></canvas>
        </section>
        
        <!-- 右侧控制面板 -->
        <aside class="control-panel">
            <!-- 状态气泡：剩余时间 | 当前玩家 | 当前阶段 -->
            <div class="panel-card status-bubble">
                <div class="status-bubble-inner">
                    <div class="bubble-item timer-display">
                        <h3>剩余时间</h3>
                        <div class="timer-value" id="timer">40</div>
                    </div>
                    <div class="bubble-divider"></div>
                    <div class="bubble-item player-display">
                        <h3>当前玩家</h3>
                        <div class="player-value" id="current-player">玩家 B</div>
                    </div>
                    <div class="bubble-divider"></div>
                    <div class="bubble-item phase-display">
                        <h3>当前阶段</h3>
                        <div class="phase-hint-text" id="phase-hint">请点击棋盘选择目标网格</div>
                    </div>
                </div>
            </div>
            
            <!-- 表达式构建区 -->
            <div class="panel-card">
                <h3>函数表达式</h3>
                <div class="expression-display" id="expression-display">
                    <span class="placeholder">点击元素构建表达式...</span>
                </div>
            </div>
            
            <!-- 按钮组 -->
            <div class="panel-card">
                <div class="button-group">
                    <button class="btn btn-primary" id="confirm-btn" data-arrow>确认目标</button>
                    <button class="btn btn-secondary" id="clear-btn">清除</button>
                    <button class="btn btn-exit" id="exit-btn">退出对局</button>
                </div>
            </div>
            
            <!-- 退出确认气泡框 -->
            <div class="exit-confirm-popover" id="exit-confirm-popover">
                <p>确定要退出当前对局吗？</p>
                <div class="popover-buttons">
                    <button class="btn btn-small btn-confirm-exit" id="confirm-exit-btn">确认退出</button>
                    <button class="btn btn-small btn-cancel" id="cancel-exit-btn">取消</button>
                </div>
            </div>
            
            <!-- 消息提示 -->
            <div class="panel-card message-panel" id="message-panel">
                <div class="message" id="message"></div>
            </div>
        </aside>
    </div>
    
    <!-- 底部元素拖拽区 -->
    <section class="elements-section" id="elements-container">
        <!-- 动态生成 -->
    </section>
    
    <!-- 开始界面模态框 -->
    <div class="modal" id="start-modal">
        <div class="modal-content">
            <h2>函数棋</h2>
            
            <div class="round-select">
                <label for="round-select">选择回合数：</label>
                <select id="round-select">
                    <option value="8" selected>8 回合（快速对战）</option>
                    <option value="12">12 回合（深度对战）</option>
                    <option value="16">16 回合（持久战）</option>
                    <option value="20">20 回合（极限挑战）</option>
                    <option value="24">24 回合（终极对决）</option>
                </select>
            </div>
            
            <div class="difficulty-select">
                <label for="difficulty-select">选择难度/模式：</label>
                <select id="difficulty-select">
                    <option value="easy" selected>简单 - 1个目标格</option>
                    <option value="normal">普通 - 2个目标格</option>
                    <option value="expert">专家 - 3个目标格</option>
                    <option value="test">测试模式 - 自由绘图</option>
                </select>
                <small id="difficulty-hint" style="display: block; margin-top: 5px; opacity: 0.7;">简单模式：1个目标格</small>
            </div>
                        
            <!-- 游戏模式切换 -->
            <div class="mode-select">
                <div class="mode-toggle">
                    <button class="mode-btn active" id="mode-local" data-mode="local">👥 本地对战</button>
                    <button class="mode-btn" id="mode-ai" data-mode="ai">🤖 人机对战</button>
                    <button class="mode-btn" id="mode-campaign" data-mode="campaign">🧩 闯关模式</button>
                </div>
                <small id="mode-hint" style="display: block; margin-top: 5px; opacity: 0.7;">本地对战：两位玩家轮流操作</small>
            </div>

            <!-- 闯关模式选关 -->
            <div class="panel-card" id="campaign-panel" style="display:none; margin-top: 10px; padding: 12px;">
                <div style="opacity:0.85; font-size: 13px; margin-bottom: 6px;">
                    需通关前置关卡才能解锁后续关卡
                </div>
                <label for="campaign-level-select">选择关卡：</label>
                <select id="campaign-level-select" style="width: 100%; margin-top: 6px;">
                    <option value="1">关卡 1</option>
                </select>
                <small id="campaign-progress" style="display:block; margin-top:6px; opacity:0.7;"></small>
            </div>
            <small id="developer-hint" style="display:block; margin: 8px 0 0; opacity:0.55;">按 Tab 可进入开发者模式，关卡不再受解锁限制</small>
                        
            <button class="btn btn-primary" id="start-btn" style="width: 100;">开始游戏</button>
        </div>
    </div>

    <!-- 闯关模式模态框 -->
    <div class="modal" id="campaign-modal" style="display:none;">
        <div class="modal-content" style="max-width: 900px;">
            <h2>闯关模式</h2>
            
            <div id="campaign-step-difficulty">
                <div class="campaign-difficulty-grid" id="campaign-difficulty-grid" style="margin-bottom: 10px;">
                    <button class="btn" id="campaign-diff-easy">简单（1-29）</button>
                    <button class="btn" id="campaign-diff-normal">中等（30-53）</button>
                    <button class="btn" id="campaign-diff-hard">困难（54-69）</button>
                    <button class="btn" id="campaign-diff-expert">专家（70-81）</button>
                    <button class="btn" id="campaign-diff-unsolvable" style="display:none;">无解（82-90）</button>
                </div>
                <div style="display:flex; gap:10px; justify-content: space-between; align-items:center; flex-wrap: wrap;">
                    <div style="display:flex; align-items:center; gap:10px; flex:1; min-width: 260px;">
                        <div id="campaign-star-progress" class="campaign-star-progress"></div>
                        <small id="campaign-global-progress" style="opacity:0.75;"></small>
                    </div>
                    <div id="campaign-lrsigma-container" style="width: 100%; text-align: center; margin-top: 4px;">
                        <small id="campaign-lrsigma-display" style="color: #a78bfa; font-weight: 500;"></small>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-secondary" id="campaign-reset-btn">重置进度</button>
                        <button class="btn btn-exit" id="campaign-close-btn">返回</button>
                    </div>
                </div>
            </div>

            <div id="campaign-step-levels" style="display:none;">
                <div style="display:flex; justify-content: space-between; align-items:center; margin-bottom: 10px;">
                    <div>
                        <div id="campaign-level-title" style="font-weight:bold;"></div>
                        <small id="campaign-level-progress" style="opacity:0.75;"></small>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn btn-secondary" id="campaign-back-btn">返回难度</button>
                        <button class="btn btn-exit" id="campaign-close-btn2">关闭</button>
                    </div>
                </div>
                <div id="campaign-level-grid" class="campaign-level-grid"></div>
            </div>
        </div>
    </div>

    <input id="campaign-file-input" type="file" accept=".txt,application/json,text/plain" style="display:none;">
    
    <!-- 游戏结束模态框 -->
    <div class="modal" id="game-over-modal" style="display: none;">
        <div class="modal-content">
            <h2>游戏结束</h2>
            <div class="winner-text" id="winner"></div>
            <div class="final-scores" id="final-scores"></div>
            <button class="btn btn-primary" id="view-report-btn" data-arrow style="width: 100%; margin-bottom: 10px;">查看游戏报告</button>
            <button class="btn btn-primary" id="restart-btn" data-arrow style="width: 100%;">重新开始</button>
        </div>
    </div>

    <!-- 闯关胜利模态框 -->
    <div class="modal" id="campaign-victory-modal" style="display: none;">
        <div class="modal-content campaign-victory-content">
            <h2>关卡胜利</h2>
            <div class="campaign-victory-text" id="campaign-victory-text">恭喜通关！</div>
            <div class="campaign-victory-actions">
                <button class="btn btn-primary icon-btn" id="campaign-home-btn" title="返回关卡选择">
                    <span class="icon">⌂</span>
                    <span>关卡选择</span>
                </button>
                <button class="btn btn-primary icon-btn" id="campaign-retry-btn" title="再来一次">
                    <span class="icon">↻</span>
                    <span>再来一次</span>
                </button>
                <button class="btn btn-primary icon-btn" id="campaign-next-btn" title="下一关">
                    <span>下一关</span>
                    <span class="icon">→</span>
                </button>
            </div>
        </div>
    </div>
    
    <!-- 游戏报告模态框 -->
    <div class="modal" id="report-modal" style="display: none;">
        <div class="modal-content report-modal-content">
            <h2>游戏报告</h2>
            <div id="report-content"></div>
            <button class="btn btn-secondary" id="close-report-btn" style="width: 100%; margin-top: 20px;">关闭</button>
        </div>
    </div>

    <!-- Summa训练选择弹窗 -->
    <div class="modal" id="summa-train-dialog" style="display: none;">
        <div class="modal-content summa-dialog-content">
            <img class="summa-dialog-icon" src="Summa形象处理/summa_image/happy.PNG" alt="Summa 图标">
            <h2 class="summa-dialog-title" id="summa-dialog-title">唤醒 Summa</h2>
            <p class="summa-dialog-message" id="summa-dialog-message"></p>
            
            <!-- 选项按钮容器 -->
            <div class="summa-dialog-options" id="summa-dialog-options"></div>
            
            <!-- 确认按钮（用于prompt输入框） -->
            <div class="summa-dialog-input-area" id="summa-dialog-input-area" style="display: none;">
                <input type="text" id="summa-dialog-input" class="summa-dialog-input" placeholder="输入数值...">
                <div class="summa-dialog-input-buttons">
                    <button class="btn btn-secondary" id="summa-dialog-input-cancel">取消</button>
                    <button class="btn btn-primary" id="summa-dialog-input-confirm">确认</button>
                </div>
            </div>
            <div class="summa-dialog-footer-actions">
                <button class="btn summa-dialog-skip-btn" id="summa-dialog-skip-btn">跳过</button>
                <button class="btn summa-dialog-exit-btn" id="summa-dialog-exit-btn">退出</button>
            </div>
        </div>
    </div>
    
    <!-- 加载 JavaScript 模块 -->
    <!-- 响应式布局管理器（优先加载） -->
    <script src="js/ResponsiveLayout.js"></script>
    <script src="js/GridSystem.js"></script>
    <script src="js/CollisionDetector.js"></script>
    <script src="js/函数复杂度运算/function-complexity-analyzer.js"></script>
    <script src="js/FunctionParser.js"></script>
    <!-- geogebra-lite 核心引擎（采样+裁剪） -->
    <script src="geogebra-lite/plot/Gap.js"></script>
    <script src="geogebra-lite/plot/PathPlotter.js"></script>
    <script src="geogebra-lite/plot/CurveSegmentInfo.js"></script>
    <script src="geogebra-lite/plot/SegmentParams.js"></script>
    <script src="geogebra-lite/plot/CurvePlotterStackItem.js"></script>
    <script src="geogebra-lite/plot/CurvePlotterStack.js"></script>
    <script src="geogebra-lite/plot/CurvePlotterUtils.js"></script>
    <script src="geogebra-lite/plot/TupleNeighbours.js"></script>
    <script src="geogebra-lite/plot/LabelPositionCalculator.js"></script>
    <script src="geogebra-lite/plot/GeneralPathClippedForCurvePlotter.js"></script>
    <script src="geogebra-lite/plot/CurveSegmentPlotter.js"></script>
    <script src="geogebra-lite/plot/CurvePlotter.js"></script>
    <script src="js/FunctionRenderer.js"></script>
    <!-- 全局音频管理器和角色管理器 -->
    <script src="js/AudioManager.js"></script>
    <!-- SummaAnimator 必须在 SummaCharacter 之前加载 -->
    <script src="Summa形象处理/SummaAnimator.js"></script>
    <script src="Summa形象处理/SummaCharacter.js"></script>
    
    <!-- Ai和控制器 -->
    <script src="js/AIController.js"></script>
    <script src="js/GameController.js"></script>
    <script src="js/campaignLevels.js"></script>
    <script src="js/UIController.js"></script>
    <script src="js/SummaTrainer.js"></script>
    
    <script>
        // 初始化游戏
        document.addEventListener('DOMContentLoaded', () => {
            // 创建核心组件
            const gridSystem = new GridSystem('game-canvas');
            const gameController = new GameController();
            
            // 创建UI控制器
            const uiController = new UIController(gridSystem, gameController);
            
            // 创建Summa训练器
            const summaTrainer = new SummaTrainer(gameController, gridSystem);
            
            // 将训练器暴露到全局，方便控制台调用
            window.summaTrainer = summaTrainer;
            window.gameController = gameController;
            window.uiController = uiController;
            
            // 显示开始界面
            document.getElementById('start-modal').style.display = 'flex';
            
            console.log('函数棋游戏已加载完成！');
            console.log('游戏模块:', {
                gridSystem: !!gridSystem,
                gameController: !!gameController,
                uiController: !!uiController,
                summaTrainer: !!summaTrainer
            });
            
            console.log('\n=== Summa训练器已就绪 ===');
            console.log('使用方法：');
            console.log('1. 开始训练: summaTrainer.startTraining({totalGames: 1000, difficulty: "hard"})');
            console.log('2. 停止训练: summaTrainer.stopTraining()');
            console.log('3. 查看统计: summaTrainer.getTrainingStats()');
            console.log('4. 加载数据: summaTrainer.loadTrainingData()');
            console.log('========================\n');
        });
    </script>

    <!-- <<< 按钮交互增强：涟漪 + 磁性吸附 + 光晕跟随 + 箭头注入 >>> -->
    <script>
        (function initButtonEnhancements() {
            var btns = document.querySelectorAll('.btn, .btn-exit, .mode-btn, .btn-small, .summa-dialog-option-btn, .summa-dialog-skip-btn, .summa-dialog-exit-btn, .campaign-difficulty-grid .btn, .campaign-level-cell, .summa-dialog-input-buttons .btn');

            // ── 箭头注入 ──
            btns.forEach(function(el) {
                if (el.hasAttribute('data-arrow') && !el.querySelector('.btn-arrow')) {
                    var arrow = document.createElement('span');
                    arrow.className = 'btn-arrow';
                    arrow.textContent = '\u2192';
                    el.appendChild(arrow);
                }
            });

            btns.forEach(function(el) {
                // ── 涟漪 ──
                el.addEventListener('click', function(e) {
                    var rect = el.getBoundingClientRect();
                    var ripple = document.createElement('span');
                    ripple.className = 'ripple';
                    var size = Math.max(rect.width, rect.height);
                    ripple.style.width = ripple.style.height = size + 'px';
                    ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
                    ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
                    el.appendChild(ripple);
                    setTimeout(function() { ripple.remove(); }, 650);
                });

                // ── 磁性吸附 + 光晕跟随（仅桌面，有鼠标时） ──
                el.addEventListener('mousemove', function(e) {
                    if (this.disabled) return;
                    var rect = this.getBoundingClientRect();
                    // 光晕坐标（百分比）
                    var gx = ((e.clientX - rect.left) / rect.width * 100).toFixed(1);
                    var gy = ((e.clientY - rect.top) / rect.height * 100).toFixed(1);
                    this.style.setProperty('--gx', gx + '%');
                    this.style.setProperty('--gy', gy + '%');
                    // 磁性偏移
                    var mx = ((e.clientX - rect.left - rect.width / 2) / rect.width  * 6).toFixed(1);
                    var my = ((e.clientY - rect.top  - rect.height / 2) / rect.height * 6).toFixed(1);
                    this.style.setProperty('--mx', mx + 'px');
                    this.style.setProperty('--my', my + 'px');
                    // 不覆盖 CSS hover 的 translateY(-3px)，用 transform 叠加
                });
                el.addEventListener('mouseleave', function() {
                    this.style.removeProperty('--gx');
                    this.style.removeProperty('--gy');
                    this.style.removeProperty('--mx');
                    this.style.removeProperty('--my');
                });
            });
        })();
    </script>
</body>
</html>
