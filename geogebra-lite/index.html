<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>函数绘图 Lite</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app">
    <aside class="panel">
      <h1>函数绘图 Lite</h1>
      <p class="subtitle">支持与函数棋一致的符号输入</p>

      <label for="expr">函数表达式</label>
      <div class="input-with-prefix">
        <span class="input-prefix">y=</span>
        <textarea id="expr" rows="3" autocomplete="off" spellcheck="false"></textarea>
      </div>

      <div class="buttons">
        <button id="drawBtn">绘制</button>
        <button id="clearBtn" class="secondary">清空</button>
      </div>

      <div class="status" id="status"></div>

      <label>快捷示例</label>
      <div class="examples">
        <button class="chip" data-expr="x^2">x^2</button>
        <button class="chip" data-expr="1/x">1/x</button>
        <button class="chip" data-expr="sin(x)">sin(x)</button>
        <button class="chip" data-expr="sqrt(x)">sqrt(x)</button>
        <button class="chip" data-expr="i*i">i*i</button>
        <button class="chip" data-expr="(1+i)^2">(1+i)^2</button>
        <button class="chip" data-expr="10000x">10000x</button>
        <button class="chip" data-expr="1000tan(x)">1000tan(x)</button>
        <button class="chip" data-expr="tan(x+3)">tan(x+3)</button>
        <button class="chip" data-expr="1/cos(x)">1/cos(x)</button>
        <button class="chip" data-expr="abs(x-3.1)/(x-3.1)">abs(x-3.1)/(x-3.1)</button>
        <button class="chip" data-expr="abs(x-e)/(x-2.71)">abs(x-e)/(x-2.71)</button>
        <button class="chip" data-expr="x!!!">x!!!</button>
      </div>

      <div class="hint">
        支持：<code>x</code>、<code>π</code>、<code>e</code>、<code>i</code>、<code>+</code>、<code>-</code>、<code>*</code>、<code>/</code>、<code>^</code>、<code>!</code><br />
        函数：<code>sin</code>、<code>cos</code>、<code>tan</code>、<code>abs</code>、<code>ln</code>、<code>sqrt</code>
      </div>
    </aside>

    <main class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </main>
  </div>

  <script src="parser.js"></script>
  <script src="ContinuityClassifier.js"></script>
  <script src="DomainInspector.js"></script>
  <script src="AdaptiveCurvePlotter.js"></script>
  <script src="plot/Gap.js"></script>
  <script src="plot/PathPlotter.js"></script>
  <script src="plot/CurveSegmentInfo.js"></script>
  <script src="plot/SegmentParams.js"></script>
  <script src="plot/CurvePlotterStackItem.js"></script>
  <script src="plot/CurvePlotterStack.js"></script>
  <script src="plot/CurvePlotterUtils.js"></script>
  <script src="plot/TupleNeighbours.js"></script>
  <script src="plot/LabelPositionCalculator.js"></script>
  <script src="plot/GeneralPathClippedForCurvePlotter.js"></script>
  <script src="plot/CurveSegmentPlotter.js"></script>
  <script src="plot/CurvePlotter.js"></script>
  <script src="GeoGebraCurvePlotter.js"></script>
  <script src="geogebra-lite-entry.js"></script>
  <script src="plotter.js"></script>
  <script src="app.js"></script>
</body>
</html>
